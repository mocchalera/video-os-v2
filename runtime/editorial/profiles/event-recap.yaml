id: event-recap
default_policy: highlight
defaults:
  target_duration_sec: 60
  opening_cadence: "aggressive"
  middle_cadence: "brisk"
  ending_cadence: "resolving"
  max_shot_length_frames: 72
  default_transition: "crossfade"
  crossfade_frames: 6
  active_editing_skills:
    - build_to_peak
    - smash_cut_energy
    - match_cut_bridge
    - cooldown_resolve
    - b_roll_bridge
  quality_target_overrides:
    hook_density_min: 0.6
    novelty_rate_min: 0.8
  trim_policy_overrides:
    mode: adaptive
    default_preferred_duration_frames: 48
    default_min_duration_frames: 12
    default_max_duration_frames: 96

version: "1"
policy_name: "m2-canonical-defaults"

classification:
  dialogue:
    words_per_second_min: 1.5
    speech_ratio_min: 0.35
  music_driven:
    beat_strength_min: 0.60
  action:
    motion_score_min: 0.45
  static:
    motion_score_max: 0.15
  general: {}

sampling:
  static:
    sample_fps: 0.5
  action:
    sample_fps_default: 4
    sample_fps_min: 3
    sample_fps_max: 5
  dialogue:
    sample_fps: 0.5
  music_driven:
    sample_fps: 1
  general:
    sample_fps: 1

vlm:
  model_alias: gemini-2.0-flash
  model_snapshot: "required_for_canonical_runs"
  input_mode: frame_bundle_plus_text_context
  response_format: json_schema_v1
  prompt_template_id: m2-segment-v1
  max_frame_width_px: 1024
  segment_visual_token_budget_max: 8192
  segment_visual_output_tokens_max: 512
  segment_visual_frame_cap: 90
  parse_retry_max: 1

stt:
  model_alias: whisper-large-v3-turbo
  model_snapshot: "required_for_canonical_runs"
  endpoint: /v1/audio/transcriptions
  response_format: verbose_json
  language: ja
  chunk_target_us: 20000000
  chunk_max_us: 25000000
  chunk_overlap_us: 500000
  chunk_boundary_silence_us: 350000
  chunking_strategy: client_audio_chunks_v1
  speaker_normalization: overlap_anchor_v1
  generate_words: true

quality_thresholds:
  scene_threshold: 0.30
  min_segment_duration_us: 750000
  merge_gap_us: 200000
  blackdetect_pic_th: 0.98
  blackdetect_pix_th: 0.10
  blackdetect_duration_s: 0.15
  silencedetect_noise_db: -35
  silencedetect_duration_s: 0.35
  freezedetect_noise_db: -50
  freezedetect_duration_s: 0.50
  transcript_overlap_min_us: 250000
  transcript_overlap_fraction_min: 0.25

parallelism:
  ffmpeg_jobs: 4
  stt_jobs: 2
  vlm_jobs: 2

gap_policy:
  max_retries: 2
  block_on_missing_segments: true
  block_on_missing_transcript_for_dialogue: true

cache:
  reuse_successful_stage_outputs: true
  request_hash_fields:
    - connector_version
    - model_snapshot
    - prompt_hash
    - response_format
    - chunking_strategy
    - ffmpeg_version
